<style>
  .cts *, .cts *::before, .cts *::after { box-sizing: border-box; }
  .cts {
    --bg:#FFFFFF; --surface:#fff; --ink:#0B0C0F; --soft:#5E6675; --faint:#A8AFBC;
    --accent:#F47735; --accent-ink:#BC4F13; --accent-soft:#FEF4EC;
    --navy:#1E222A; --navy-soft:#ECEEF2;
    --green:#2C7A56; --green-soft:#DFEDE6; --amber:#B07D18; --amber-soft:#F6E9CF;
    --red:#AE372C; --red-soft:#F4DCD8; --line:#CDD2DB; --line-soft:#E8EBEF; --gold:#C89A3C;
    --shadow-card:0 1px 2px rgba(11,12,15,.05), 0 2px 8px rgba(11,12,15,.04);
    --shadow-pop:0 10px 30px rgba(11,12,15,.10), 0 2px 6px rgba(11,12,15,.06);
    font-family:'IBM Plex Sans',-apple-system,sans-serif; background:var(--bg); color:var(--ink); min-height:100vh; padding-bottom:70px;
  }
  .cts body,body:has(.cts){background:var(--bg);}
  .cts .disp{font-family:'Saira','IBM Plex Sans',sans-serif;}
  .cts .mono{font-family:'IBM Plex Mono',monospace;}
  .cts .brand-logo{display:block;height:26px;width:auto;}
  .cts .gate-logo{display:block;height:34px;width:auto;margin:0 auto 18px;}

  /* Gate / login */
  .cts .gate{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
  .cts .gate-card{background:var(--surface);border:1px solid var(--line-soft);border-radius:16px;padding:30px 26px;max-width:400px;width:100%;box-shadow:var(--shadow-pop);border-top:3px solid var(--ink);}
  .cts .gate-mark{width:46px;height:46px;border-radius:12px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:22px;font-family:'Saira';margin-bottom:18px;}
  .cts .gate-title{font-family:'Saira';font-size:22px;font-weight:700;margin-bottom:4px;}
  .cts .gate-sub{font-size:13.5px;color:var(--soft);margin-bottom:22px;line-height:1.5;}
  .cts .role-btns{display:flex;flex-direction:column;gap:10px;}
  .cts .role-btn{display:flex;align-items:center;gap:12px;text-align:left;padding:15px 16px;border-radius:11px;border:1px solid var(--line);background:var(--surface);cursor:pointer;transition:border-color .15s,transform .08s,box-shadow .15s;font-family:inherit;}
  .cts .role-btn:hover{border-color:var(--ink);box-shadow:var(--shadow-card);}
  .cts .role-btn:active{transform:scale(.99);}
  .cts .role-btn:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
  .cts .role-ico{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
  .cts .role-name{font-weight:700;font-size:15px;}
  .cts .role-desc{font-size:12px;color:var(--soft);margin-top:1px;}

  .cts .field{margin-bottom:14px;}
  .cts .field label{display:block;font-size:12px;font-weight:600;color:var(--soft);margin-bottom:6px;}
  .cts .field input,.cts .field select,.cts .field textarea{width:100%;font-family:inherit;font-size:15px;padding:11px 12px;border-radius:10px;border:1.5px solid var(--line);background:var(--surface);color:var(--ink);}
  .cts .field input:focus,.cts .field select:focus{outline:none;border-color:var(--accent);}
  .cts .field textarea{resize:vertical;min-height:56px;}
  .cts .pin-input{letter-spacing:.4em;text-align:center;font-family:'IBM Plex Mono';font-size:20px !important;}
  .cts .field-row{display:flex;gap:12px;}
  .cts .field-row .field{flex:1;}
  .cts .link-btn{background:none;border:none;color:var(--accent);font-weight:600;font-size:13px;cursor:pointer;font-family:inherit;padding:6px 0;}
  .cts .err{color:var(--red);font-size:12.5px;margin-top:8px;font-weight:600;}

  .cts .btn{font-family:inherit;font-size:14px;font-weight:600;border-radius:10px;padding:11px 16px;border:1px solid var(--line);background:var(--surface);color:var(--ink);cursor:pointer;transition:transform .08s,box-shadow .15s;}
  .cts .btn:active{transform:scale(.98);}
  .cts .btn-primary{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(244,119,53,.28);}
  .cts .btn-navy{background:var(--navy);border-color:var(--navy);color:#fff;}
  .cts .btn-ghost{background:transparent;border-color:transparent;color:var(--soft);}
  .cts .btn-full{width:100%;}
  .cts .btn:focus-visible{outline:2px solid var(--accent-ink);outline-offset:1px;}

  .cts .hdr{color:#fff;padding:16px 18px 14px;border-bottom:3px solid transparent;}
  .cts .hdr-rm{background:var(--ink);}
  .cts .hdr-cmd{background:var(--ink);border-bottom-color:var(--accent);}
  .cts .hdr-pay{background:linear-gradient(135deg,#0B0C0F,#2F343D);border-bottom-color:var(--accent);}
  .cts .hdr-top{display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .cts .hdr-id{display:flex;align-items:center;gap:10px;}
  .cts .hdr-mark{width:32px;height:32px;border-radius:9px;background:rgba(255,255,255,.14);display:flex;align-items:center;justify-content:center;font-weight:700;font-family:'Saira';flex-shrink:0;}
  .cts .hdr-title{font-size:15px;font-weight:700;line-height:1.15;font-family:'Saira';}
  .cts .hdr-sub{font-size:11.5px;opacity:.7;}
  .cts .logout{background:rgba(255,255,255,.12);border:none;color:#fff;font-family:inherit;font-size:12px;font-weight:600;padding:7px 12px;border-radius:8px;cursor:pointer;}
  .cts .tabs{display:flex;gap:4px;margin-top:14px;background:rgba(255,255,255,.1);border-radius:11px;padding:4px;}
  .cts .tab{flex:1;border:none;background:transparent;color:rgba(255,255,255,.7);font-family:inherit;font-size:12.5px;font-weight:600;padding:9px 4px;border-radius:8px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .cts .tab.active{background:#fff;color:var(--ink);}
  .cts .hdr-cmd .tab.active,.cts .hdr-pay .tab.active{color:var(--accent-ink);}

  .cts .wrap{max-width:680px;margin:0 auto;padding:18px 14px 0;}
  .cts .wrap-wide{max-width:920px;}

  .cts .sec-title{font-family:'Saira';font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--ink);margin:20px 0 10px;display:flex;align-items:center;gap:8px;}
  .cts .sec-title::before{content:"";width:14px;height:2px;background:var(--accent);border-radius:2px;flex:none;}
  .cts .sec-title:first-child{margin-top:4px;}

  .cts .card{background:var(--surface);border:1px solid var(--line-soft);border-radius:12px;padding:15px;margin-bottom:11px;box-shadow:var(--shadow-card);}
  .cts .empty{text-align:center;padding:44px 20px;color:var(--soft);}
  .cts .empty .disp{font-size:16px;color:var(--ink);margin-bottom:5px;}

  .cts .deal-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
  .cts .deal-name{font-family:'Saira';font-size:15.5px;font-weight:700;}
  .cts .deal-meta{font-size:12px;color:var(--soft);margin-top:2px;}
  .cts .hb{font-size:10.5px;font-weight:700;padding:4px 9px;border-radius:100px;white-space:nowrap;display:flex;align-items:center;gap:5px;}
  .cts .hb .dot{width:7px;height:7px;border-radius:50%;}
  .cts .hb-green{background:var(--green-soft);color:var(--green);} .cts .hb-green .dot{background:var(--green);}
  .cts .hb-amber{background:var(--amber-soft);color:var(--amber);} .cts .hb-amber .dot{background:var(--amber);}
  .cts .hb-red{background:var(--red-soft);color:var(--red);} .cts .hb-red .dot{background:var(--red);}

  .cts .rail{display:flex;align-items:center;margin:11px 0 8px;}
  .cts .rail-w{display:flex;align-items:center;flex:1;}
  .cts .node{width:9px;height:9px;border-radius:50%;border:2px solid var(--faint);background:var(--surface);flex-shrink:0;}
  .cts .node.done{background:var(--ink);border-color:var(--ink);}
  .cts .node.cur{width:13px;height:13px;}
  .cts .seg{flex:1;height:2px;background:var(--line);}
  .cts .seg.done{background:var(--faint);}
  .cts .stg-lbl{font-size:11.5px;font-weight:600;color:var(--soft);}
  .cts .drow{display:flex;justify-content:space-between;font-size:12.5px;margin-top:4px;gap:10px;}
  .cts .drow .k{color:var(--soft);flex-shrink:0;} .cts .drow .v{text-align:right;}
  .cts .stale-tag{display:inline-flex;align-items:center;gap:4px;background:var(--red-soft);color:var(--red);font-size:10.5px;font-weight:700;padding:3px 8px;border-radius:100px;margin-top:8px;}
  .cts .prem{font-family:'IBM Plex Mono';font-weight:600;}
  .cts .cta{display:flex;gap:8px;margin-top:11px;}

  /* Leaderboard */
  .cts .lb-row{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid var(--line);}
  .cts .lb-row:last-child{border-bottom:none;}
  .cts .lb-row.me{background:var(--accent-soft);border-radius:11px;}
  .cts .lb-rank{font-family:'Saira';font-size:17px;font-weight:700;color:var(--faint);width:26px;text-align:center;flex-shrink:0;}
  .cts .lb-rank.top{color:var(--gold);}
  .cts .lb-body{flex:1;min-width:0;}
  .cts .lb-name{font-weight:700;font-size:14px;}
  .cts .lb-bar-bg{background:var(--bg);border-radius:5px;height:6px;margin-top:5px;overflow:hidden;}
  .cts .lb-bar{height:100%;background:var(--accent);border-radius:5px;}
  .cts .lb-val{text-align:right;flex-shrink:0;}
  .cts .lb-num{font-family:'IBM Plex Mono';font-weight:600;font-size:13px;}
  .cts .lb-sub{font-size:10.5px;color:var(--soft);}
  .cts .metric-switch{display:flex;gap:6px;margin-bottom:10px;}
  .cts .ms-btn{flex:1;border:1.5px solid var(--line);background:var(--surface);border-radius:9px;padding:8px;font-family:inherit;font-size:12px;font-weight:600;color:var(--soft);cursor:pointer;}
  .cts .ms-btn.active{border-color:var(--accent);background:var(--accent-soft);color:var(--accent-ink);}

  /* KPI */
  .cts .kpis{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
  @media(min-width:640px){.cts .kpis{grid-template-columns:repeat(4,1fr);}}
  .cts .kpi{background:var(--surface);border:1px solid var(--line-soft);border-radius:12px;padding:14px 13px;box-shadow:var(--shadow-card);position:relative;overflow:hidden;}
  .cts .kpi::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--ink);}
  .cts .kpi-l{font-size:10.5px;color:var(--soft);font-weight:700;text-transform:uppercase;letter-spacing:.04em;}
  .cts .kpi-v{font-family:'Saira';font-size:23px;font-weight:800;margin-top:3px;color:var(--ink);letter-spacing:-.01em;}
  .cts .kpi-sub{font-size:10.5px;color:var(--soft);margin-top:3px;display:flex;gap:7px;}
  .cts .kpi-sub .dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:2px;}

  .cts table{width:100%;border-collapse:collapse;font-size:12.5px;}
  .cts th{text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.03em;color:var(--soft);padding:8px 9px;border-bottom:1px solid var(--line);}
  .cts td{padding:9px;border-bottom:1px solid var(--line);}
  .cts tr:last-child td{border-bottom:none;}
  .cts .tot-row td{font-weight:700;background:var(--bg);}

  .cts .change-item{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--line);}
  .cts .change-item:last-child{border-bottom:none;}
  .cts .change-ico{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
  .cts .change-txt{font-size:13px;line-height:1.4;}
  .cts .change-time{font-size:11px;color:var(--faint);margin-top:1px;}

  .cts .modal-bd{position:fixed;inset:0;background:rgba(28,26,23,.5);display:flex;align-items:flex-end;justify-content:center;z-index:100;}
  @media(min-width:640px){.cts .modal-bd{align-items:center;}}
  .cts .modal{background:var(--surface);width:100%;max-width:520px;max-height:88vh;overflow-y:auto;border-radius:18px 18px 0 0;padding:20px 18px 26px;}
  @media(min-width:640px){.cts .modal{border-radius:18px;}}
  .cts .modal-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
  .cts .modal-t{font-family:'Saira';font-size:17px;font-weight:700;}
  .cts .x{background:none;border:none;font-size:20px;color:var(--soft);cursor:pointer;padding:4px;}
  .cts .hp{display:flex;gap:8px;}
  .cts .hp-opt{flex:1;text-align:center;padding:9px 4px;border-radius:9px;border:1.5px solid var(--line);font-size:11.5px;font-weight:700;cursor:pointer;background:var(--surface);color:var(--soft);}
  .cts .hp-opt.sg{border-color:var(--green);background:var(--green-soft);color:var(--green);}
  .cts .hp-opt.sa{border-color:var(--amber);background:var(--amber-soft);color:var(--amber);}
  .cts .hp-opt.sr{border-color:var(--red);background:var(--red-soft);color:var(--red);}

  .cts .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:11px 18px;border-radius:10px;font-size:13px;font-weight:600;z-index:200;box-shadow:0 8px 24px rgba(0,0,0,.2);}
  .cts .fab{position:fixed;bottom:20px;right:18px;width:54px;height:54px;border-radius:50%;background:var(--accent);color:#fff;border:none;font-size:26px;box-shadow:0 8px 20px rgba(179,74,28,.4);cursor:pointer;z-index:50;}
  .cts .report-box{white-space:pre-wrap;font-family:'IBM Plex Mono';font-size:12px;background:var(--ink);color:#EDE9E3;padding:14px;border-radius:12px;line-height:1.6;max-height:340px;overflow-y:auto;}
  .cts .help{font-size:11.5px;color:var(--faint);margin-top:5px;line-height:1.4;}
  .cts .note{background:var(--navy-soft);border-radius:10px;padding:10px 12px;font-size:12px;color:var(--navy);line-height:1.45;margin-bottom:12px;}
  .cts .pay-line{display:flex;justify-content:space-between;padding:7px 0;font-size:13px;border-bottom:1px solid var(--line);}
  .cts .pay-line.big{font-weight:700;font-size:15px;border-bottom:none;padding-top:11px;}
  .cts .del-x{background:none;border:none;color:var(--red);cursor:pointer;font-size:16px;padding:2px 6px;}
  .cts .pay-inp{width:100px;font-family:'IBM Plex Mono',monospace;font-size:12.5px;padding:6px 8px;border:1.5px solid var(--line);border-radius:7px;background:var(--surface);color:var(--ink);}
  .cts .pay-inp:focus{outline:none;border-color:var(--accent);}
  .cts .pay-inp.pay-pct{width:60px;}
</style>

    stage_entry:d.stageEntryDate||null, last_activity:d.lastActivity||null, archived:!!d.archived, updated_at:nowISO()};}

    commission:+r.commission||0, policy:r.policy_no||'', insurer:r.insurer||'', status:r.status||'Existing', renewal:r.renewal||'',
    lastVisit:r.last_visit||'', movement:r.movement||'', impact:+r.impact||0, notes:r.notes||'', health:r.health||'green', activity:r.activity_json||[]};}

  async function _sbGet(route){
    const org=await resolveOrg(); if(!org) return null;
    if(route.kind==='deals'){
      const {data,error}=await sb.from('deals').select('*').eq('org_id',org).eq('rm_slug',route.slug);
      if(error)throw error; return (data||[]).map(_dealRowToApp);
    }
    if(route.kind==='portfolio'){
      const {data,error}=await sb.from('portfolio').select('*').eq('org_id',org).eq('rm_slug',route.slug);
      if(error)throw error; return (data||[]).map(_portRowToApp);
    }
    if(route.kind==='payroll'){
      const {data,error}=await sb.from('payroll').select('*').eq('org_id',org).eq('month',route.month).maybeSingle();
      if(error)throw error; if(!data)return null;
      return {month:data.month, rows:data.rows||[], salary:data.salary||{}, updatedAt:data.updated_at, _seeded:true};
    }
    if(route.kind==='pins'||route.kind==='meta'){
      const key=route.kind==='pins'?'pins':'meta';
      const {data,error}=await sb.from('config').select('value').eq('org_id',org).eq('key',key).maybeSingle();
      if(error)throw error; return data?data.value:null;
    }
    if(route.kind==='changes'){
      const {data,error}=await sb.from('config').select('value').eq('org_id',org).eq('key','changes:'+route.date).maybeSingle();
      if(error)throw error; return data?data.value:null;
    }
    if(route.kind==='lost'){
      const {data,error}=await sb.from('config').select('value').eq('org_id',org).eq('key','lost:'+route.slug).maybeSingle();
      if(error)throw error; return data?data.value:null;
    }
    return null;
  }

  async function _sbSet(route,val){
    const org=await resolveOrg(); if(!org) throw new Error('no org');
    if(route.kind==='deals'){
      // replace this RM's deals with the incoming array (app always hands us the full list)
      await sb.from('deals').delete().eq('org_id',org).eq('rm_slug',route.slug);
      const rows=(val||[]).map(d=>{const r=_dealAppToRow(d,route.slug); if(d.id&&/^[0-9a-f-]{36}$/i.test(d.id))r.id=d.id; return r;});
      if(rows.length){const {error}=await sb.from('deals').insert(rows); if(error)throw error;}
      return true;
    }
    if(route.kind==='portfolio'){
      await sb.from('portfolio').delete().eq('org_id',org).eq('rm_slug',route.slug);
      const rows=(val||[]).map(p=>{const r=_portAppToRow(p,route.slug); if(p.id&&/^[0-9a-f-]{36}$/i.test(p.id))r.id=p.id; return r;});
      if(rows.length){const {error}=await sb.from('portfolio').insert(rows); if(error)throw error;}
      return true;
    }
    if(route.kind==='payroll'){
      const {error}=await sb.from('payroll').upsert({org_id:org, month:route.month, rows:val.rows||[], salary:val.salary||{}, updated_at:nowISO()},{onConflict:'org_id,month'});
      if(error)throw error; return true;
    }
    if(route.kind==='pins'||route.kind==='meta'){
      const key=route.kind==='pins'?'pins':'meta';
      const {error}=await sb.from('config').upsert({org_id:org, key, value:val},{onConflict:'org_id,key'});
      if(error)throw error; return true;
    }
    if(route.kind==='changes'){
      const {error}=await sb.from('config').upsert({org_id:org, key:'changes:'+route.date, value:val},{onConflict:'org_id,key'});
      if(error)throw error; return true;
    }
    if(route.kind==='lost'){
      const {error}=await sb.from('config').upsert({org_id:org, key:'lost:'+route.slug, value:val},{onConflict:'org_id,key'});
      if(error)throw error; return true;
    }
    return true;
  }

  async function sGet(k){
    if(sb){
      try{const v=await _sbGet(_route(k)); if(v!==null){_memSet(k,JSON.stringify(v));} return v!==null?v:_memGet(k);}
      catch(e){console.warn('[Cartrack] read fell back to local:',k,e.message); return _memGet(k);}
    }
    return _memGet(k);
  }
  async function sSet(k,v){
    const json=JSON.stringify(v);
    _memSet(k,json); // always mirror locally so the session stays consistent even if the write fails
    if(sb){
      try{await _sbSet(_route(k),v); return true;}
      catch(e){console.warn('[Cartrack] write fell back to local:',k,e.message); return true;}
    }
    return true;
    if(_hasStore()){
      try{const r=await window.storage.set(k,json,true);return !!r;}
      catch(e){return true;/* mem write already succeeded */}
    }
    return true;
  }
  async function loadRM(slug){const v=await sGet('deals:'+slug);S.deals[slug]=v||[];S.loaded[slug]=true;}
  async function saveRM(slug){return sSet('deals:'+slug,S.deals[slug]);}
  async function loadAll(){await Promise.all(RMS.map(r=>S.loaded[r.slug]?0:loadRM(r.slug)));}
  async function loadConfig(){S.pins=(await sGet('config:pins'))||{};S.meta=(await sGet('config:meta'))||{};S.meta.brendanPass=DEFAULT_BRENDAN_PASS;S.meta.louriePass=DEFAULT_LOURIE_PASS;if(!S.meta.bernardPass)S.meta.bernardPass=DEFAULT_BERNARD_PASS;}
  async function savePins(){return sSet('config:pins',S.pins);}
  async function saveMeta(){return sSet('config:meta',S.meta);}
  async function loadPayroll(mo){
    const v=await sGet('payroll:'+mo);
    if(v && v.rows && v.rows.length) return v;           // saved month — return as-is
    if(v && v._seeded) return v;                          // opened before & intentionally emptied — respect it
    // First open of this month: pre-fill from every RM's book, using each policy's real
    // commission rate (% of premium) straight from the June actuals. Payout = premium × rate.
    const rows=[];
    for(const r of RMS){
      (S.portfolio[r.slug]||[]).forEach(p=>{
        const rate=(p.commRate!=null)?+p.commRate:6.25;
        rows.push({id:uid(),client:p.client,rm:r.slug,premium:+p.premium||0,commRate:rate,policy:p.policy||'',insurer:p.insurer||''});
      });
    }
    // Seed assistant-salary deductions from the June book (Chantell/Sashka splits)
    const salary=(v&&v.salary)||Object.assign({},(typeof SEED_DEDUCTIONS!=='undefined'?SEED_DEDUCTIONS:{}));
    const seeded={month:mo,rows,salary,_seeded:true};
    await sSet('payroll:'+mo, seeded);
    return seeded;
  }
  async function savePayroll(){S.payroll.updatedAt=nowISO();return sSet('payroll:'+S.payroll.month,S.payroll);}
  // Portfolio (book of business — won/active clients)
  async function loadPortfolio(slug){const v=await sGet('portfolio:'+slug);S.portfolio[slug]=v||[];S.portLoaded[slug]=true;}
  async function savePortfolio(slug){return sSet('portfolio:'+slug,S.portfolio[slug]);}
  async function loadAllPortfolio(){await Promise.all(RMS.map(r=>S.portLoaded[r.slug]?0:loadPortfolio(r.slug)));}
  async function loadHouse(){const v=await sGet('deals:__house');S.house=v||[];}
  async function saveHouse(){return sSet('deals:__house',S.house);}
  // Not-successful (lost) leads — parked in the config table per RM, so no deals-table migration.
  async function loadLost(slug){const v=await sGet('lost:'+slug);S.lost[slug]=v||[];S.lostLoaded[slug]=true;}
  async function saveLost(slug){return sSet('lost:'+slug,S.lost[slug]);}

  function allLost(){const o=[];RMS.forEach(r=>(S.lost[r.slug]||[]).forEach(l=>o.push(Object.assign({rmSlug:r.slug,rmName:r.name},l))));
    return o.sort((a,b)=>String(b.at||'').localeCompare(String(a.at||'')));}

  // ---------- SELF-HEALING SEED (idempotent; only fills EMPTY stores, never clobbers edits) ----------
  // Runs every load. Because it only writes to stores that are currently empty, it's safe to
  // repeat — and it self-heals the case where a flag was set but a data write had failed.
  async function seedIfEmpty(){
    for(const r of RMS){
      const cur=await sGet('deals:'+r.slug);
      if((!cur||cur.length===0) && SEED_DEALS[r.slug] && SEED_DEALS[r.slug].length){
        await sSet('deals:'+r.slug, SEED_DEALS[r.slug].map(d=>Object.assign({},d)));
      }
      const curP=await sGet('portfolio:'+r.slug);
      if(!curP||curP.length===0){
        const mine=SEED_PORTFOLIO.filter(p=>p.rm===r.slug);
        if(mine.length)await sSet('portfolio:'+r.slug, mine.map(p=>Object.assign({},p)));
      }
    }
    // House account (Cartrack internal lead-gen) — team pipeline, no login, no commission
    const curH=await sGet('deals:__house');
    if((!curH||curH.length===0)&&SEED_HOUSE.length){
      await sSet('deals:__house', SEED_HOUSE.map(d=>Object.assign({},d)));
    }
  }

  // ---------- WON-QUOTE IMPORT (handoff from the Premium Comparison tool) ----------
  function b64urlDecode(s){s=String(s).replace(/-/g,'+').replace(/_/g,'/');while(s.length%4)s+='=';return decodeURIComponent(escape(atob(s)));}
  function captureImport(){
    try{
      const m=/[#&]import=([^&]+)/.exec(location.hash||'');
      if(!m)return null;
      const obj=JSON.parse(b64urlDecode(m[1]));
      history.replaceState(null,'',location.pathname+location.search); // don't re-trigger on refresh
      return (obj&&typeof obj==='object'&&obj.client!=null)?obj:null;
    }catch(e){return null;}
  }

  // ---------- MY CLIENTS (RM's own book — view + edit activity) ----------
  function rmClients(slug){
    const book=(S.portfolio[slug]||[]).slice().sort((a,b)=>(+b.premium||0)-(+a.premium||0));
    const totalPrem=book.reduce((s,p)=>s+(+p.premium||0),0);
    const soon=(iso)=>{if(!iso)return false;const d=new Date(iso+'T00:00:00');if(isNaN(d))return false;const diff=(d-new Date().setHours(0,0,0,0))/864e5;return diff>=0&&diff<=60;};
    const renewals=book.filter(p=>soon(p.renewal));
    const openClaims=book.filter(p=>(p.activity||[]).some(a=>a.type==='claim'&&!a.resolved));
    const dsince=iso=>{if(!iso)return null;const d=new Date(iso.slice(0,10)+'T00:00:00');return Math.floor((new Date().setHours(0,0,0,0)-d)/864e5);};
    return `<div class="wrap">
      <div class="note">Your active book — the clients you earn commission on. <b>Tap any client to log activity</b>: a visit, a claim, a new vehicle, an endorsement. Keep it current — Brendan and Bernard see this, and it's how they know what's happening on your accounts.</div>
      <div class="kpis" style="grid-template-columns:repeat(3,1fr);">
        <div class="kpi"><div class="kpi-l">Active clients</div><div class="kpi-v">${book.length}</div></div>
        <div class="kpi"><div class="kpi-l">Book premium</div><div class="kpi-v mono" style="font-size:16px;">${zar(totalPrem)}</div></div>
        <div class="kpi"><div class="kpi-l">Open claims</div><div class="kpi-v" style="color:${openClaims.length?'var(--red)':'inherit'}">${openClaims.length}</div></div>
      </div>
      ${renewals.length?`<div class="sec-title">\u23F0 Renewals coming up</div>
      <div class="card">${renewals.sort((a,b)=>a.renewal.localeCompare(b.renewal)).map(p=>`<div class="pay-line"><span><b>${esc(p.client)}</b></span><span class="mono" style="color:var(--accent-ink);">${esc(p.renewal)}</span></div>`).join('')}</div>`:''}
      <div class="sec-title">Your clients (${book.length}) — tap to update</div>
      ${book.length===0?'<div class="empty"><div class="disp">No active clients yet</div>Your won clients appear here once they\'re on the book.</div>':
        book.map(p=>{
          const acts=(p.activity||[]).slice().sort((a,b)=>b.at.localeCompare(a.at));
          const last=acts[0];
          const vAge=dsince(p.lastVisit);
          const openClaim=(p.activity||[]).some(a=>a.type==='claim'&&!a.resolved);
          return `<div class="card client-card" data-cli="${p.id}" style="cursor:pointer;">
            <div class="deal-head"><div><div class="deal-name disp">${esc(p.client)}</div>
              <div class="deal-meta">${zar(p.premium)}${p.renewal?` · renews ${esc(p.renewal)}`:''}</div></div>
              <div style="display:flex;gap:6px;align-items:center;">
                ${openClaim?'<span class="stale-tag" style="margin:0;background:var(--red-soft);color:var(--red);">Claim open</span>':''}
                <div class="hb hb-${p.health}"><span class="dot"></span>${HEALTH[p.health]}</div></div></div>
            <div class="drow"><span class="k">Last visit</span><span class="v mono">${p.lastVisit?`${esc(p.lastVisit)} (${vAge}d ago)`:'—'}</span></div>
            ${last?`<div class="drow"><span class="k">Latest activity</span><span class="v">${esc(actLabel(last.type))} · ${esc(last.at.slice(0,10))}</span></div>`:''}
            <div class="cta"><button class="btn btn-primary" data-cliedit="${p.id}">Update client</button>
              ${acts.length?`<span style="align-self:center;font-size:11.5px;color:var(--faint);">${acts.length} log${acts.length===1?'':'s'}</span>`:''}</div>
          </div>`;
        }).join('')}
    </div>`;
  }
  function actLabel(k){const t=ACTIVITY_TYPES.find(x=>x.k===k);return t?t.label:k;}
  function actIcon(k){const t=ACTIVITY_TYPES.find(x=>x.k===k);return t?t.icon:'\u{1F4AC}';}

    document.querySelectorAll('.client-card').forEach(c=>c.onclick=()=>openClientEdit(slug,c.dataset.cli));

    return `<div class="modal-bd" id="mbd"><div class="modal">

      ${S.modal._addAct?`

          <div class="field"><label>Date</label><input id="act-date" type="date" value="${today()}"></div>
          <div class="field"><label>Detail</label><textarea id="act-note" placeholder="e.g. Added 2 trucks to fleet, premium up ~R4,200 / Claim: hail damage, 3 vehicles / Visited, reviewed cover"></textarea></div>
          <div style="display:flex;gap:8px;"><button class="btn" style="flex:1;" id="act-cancel">Cancel</button><button class="btn btn-primary" style="flex:1;" id="act-save">Log it</button></div>
        </div>`:
        `<button class="btn btn-primary btn-full" id="act-add">+ Log activity (visit, claim, vehicle…)</button>`}

      ${acts.length?`<div class="card" style="margin-top:10px;">${acts.map(a=>`<div class="change-item">
        <div class="change-ico" style="background:${a.type==='claim'?'var(--red-soft)':'var(--accent-soft)'};">${actIcon(a.type)}</div>
        <div style="flex:1;"><div class="change-txt"><b>${esc(actLabel(a.type))}</b>${a.type==='claim'?(a.resolved?' <span style="color:var(--green);">· resolved</span>':' <span style="color:var(--red);">· open</span>'):''}</div>
          ${a.note?`<div class="change-time" style="color:var(--soft);">${esc(a.note)}</div>`:''}
          <div class="change-time">${esc(a.at.slice(0,10))}${a.by?` · ${esc(a.by)}`:''}</div></div>
        ${a.type==='claim'?`<button class="link-btn" data-claim="${a.id}" style="align-self:center;">${a.resolved?'Reopen':'Resolve'}</button>`:''}
      </div>`).join('')}</div>`:'<div class="help" style="margin-top:8px;">No activity logged yet. Log the first visit, claim or change above.</div>'}

      <button class="btn btn-primary btn-full" id="cf-save" style="margin-top:14px;">Save client</button>
    </div></div>`;
  }
  function wireClientModal(){
    const {slug,id}=S.modal;
    let health=null;
    const close=()=>{S.modal=null;render();};
    document.getElementById('mx').onclick=close;
    document.getElementById('mbd').onclick=e=>{if(e.target.id==='mbd')close();};
    document.querySelectorAll('.hp-opt').forEach(o=>o.onclick=()=>{health=o.dataset.ch;document.querySelectorAll('.hp-opt').forEach(x=>x.className='hp-opt');o.classList.add(health==='green'?'sg':health==='amber'?'sa':'sr');});
    const p=()=>(S.portfolio[slug]||[]).find(x=>x.id===id);
    // add-activity toggle
    const addBtn=document.getElementById('act-add');if(addBtn)addBtn.onclick=()=>{S.modal._addAct=true;render();};
    const cancel=document.getElementById('act-cancel');if(cancel)cancel.onclick=()=>{S.modal._addAct=false;render();};
    const actSave=document.getElementById('act-save');if(actSave)actSave.onclick=async()=>{
      const rec=p();if(!rec)return;
      const type=document.getElementById('act-type').value;
      const at=document.getElementById('act-date').value||today();
      const note=document.getElementById('act-note').value.trim();
      rec.activity=rec.activity||[];
      const entry={id:uid(),type,at,note,by:rmName(slug)};
      if(type==='claim')entry.resolved=false;
      rec.activity.push(entry);
      if(type==='visit')rec.lastVisit=at; // logging a visit updates last-visit automatically
      await savePortfolio(slug);S.modal._addAct=false;render();toast('Activity logged');
    };
    // resolve/reopen claim
    document.querySelectorAll('[data-claim]').forEach(b=>b.onclick=async()=>{
      const rec=p();if(!rec)return;const a=(rec.activity||[]).find(x=>x.id===b.dataset.claim);if(a){a.resolved=!a.resolved;await savePortfolio(slug);render();toast(a.resolved?'Claim resolved':'Claim reopened');}
    });
    // save quick fields
    document.getElementById('cf-save').onclick=async()=>{
      const rec=p();if(!rec)return;
      rec.premium=parseFloat(document.getElementById('cf-prem').value)||0;
      rec.renewal=document.getElementById('cf-ren').value;
      rec.lastVisit=document.getElementById('cf-vis').value;
      if(health)rec.health=health;
      await savePortfolio(slug);S.modal=null;render();toast('Client saved');
    };
  }

  function rmPipeline(slug){
    const all=S.deals[slug]||[];
    const active=all.filter(d=>!d.archived), arch=all.filter(d=>d.archived);
    const list=S.showArch?arch:active;
    const stale=active.filter(d=>daysSince(d.lastActivity||d.stageEntryDate)>=STALE_DAYS&&d.stage<7);
    return `<div class="wrap">
      ${(!S.showArch&&stale.length)?`<div class="card" style="border:1.5px solid var(--amber);background:var(--amber-soft);margin-bottom:12px;">
        <div style="font-weight:700;font-size:13.5px;">⏱ ${stale.length} deal${stale.length===1?'':'s'} gone quiet</div>
        <div style="font-size:12.5px;color:var(--ink);margin-top:3px;line-height:1.5;">These haven't moved in ${STALE_DAYS}+ days and are showing as stale to Bernard and Brendan. Tap each one and log where it's at — even "still waiting on docs" keeps it green. A quick daily update is all it takes.</div></div>`:''}
      ${(!S.showArch&&!stale.length&&active.length)?`<div class="note" style="margin-bottom:12px;">Your pipeline's up to date — nice. Log a quick update whenever a deal moves so Bernard and Brendan always see the real picture.</div>`:''}
      ${(list.length>3)?`<div class="field" style="margin-bottom:10px;"><input id="pipe-search" placeholder="\u{1F50D} Search by name, industry or next step…" autocomplete="off"></div>`:''}
      <div class="sec-title">${S.showArch?'Archived':'Active'} deals (<span id="pipe-count">${list.length}</span>)</div>
      ${list.length===0?`<div class="empty"><div class="disp">${S.showArch?'Nothing archived':'No deals yet'}</div><div>${S.showArch?'':'Tap + to add your first prospect.'}</div></div>`:list.map(d=>dealCard(slug,d,true)).join('')}
      <div id="pipe-nomatch" class="empty" style="display:none;"><div class="disp">No matches</div><div>No leads match your search.</div></div>
      <div style="text-align:center;margin-top:8px;"><button class="btn btn-ghost" id="arch-t">${S.showArch?'← Back to active':`Show archived (${arch.length})`}</button></div>
    </div>${S.showArch?'':'<button class="fab" id="fab" aria-label="Add prospect">+</button>'}`;
  }

  function dealCard(slug,d,editable){
    const si=d.stage||1;let rail='';
    for(let i=1;i<=7;i++){const done=i<si,cur=i===si;
      rail+=`<div class="rail-w"><div class="node ${done?'done':''} ${cur?'cur':''}" style="${cur?`background:var(--${d.health});border-color:var(--${d.health});`:''}"></div>${i<7?`<div class="seg ${done?'done':''}"></div>`:''}</div>`;}
    const stale=daysSince(d.lastActivity||d.stageEntryDate)>=STALE_DAYS && si<7;
    const search=esc((d.prospectName+' '+(d.industry||'')+' '+(d.portfolioSize||'')+' '+(d.nextStep||'')).toLowerCase());
    return `<div class="card js-deal" data-search="${search}">

  function wirePipeSearch(){
    const inp=document.getElementById('pipe-search'); if(!inp)return;
    const cards=[...document.querySelectorAll('.js-deal')];
    const countEl=document.getElementById('pipe-count');

    const earnedPrem=myRows.reduce((s,r)=>s+(+r.premium||0),0);

    const sal=+((payroll.salary||{})[slug]||0);

    // Potential: this RM's active pipeline, estimated

      </div>

      <div class="sec-title">\u{1F4B0} Earned this month (booked by Brendan)</div>
      <div class="card" style="background:linear-gradient(135deg,#0B0C0F,#2F343D);color:#fff;border:none;">
        <div style="display:flex;justify-content:space-between;align-items:baseline;">
          <div><div style="font-size:12px;opacity:.75;">Net commission owed to you</div>
            <div style="font-size:10.5px;opacity:.55;margin-top:2px;">${payroll.updatedAt?`Booked by Brendan · ${new Date(payroll.updatedAt).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}`:`Not yet booked for ${moLabel}`}</div></div>
          <div class="mono" style="font-family:'Saira';font-size:26px;font-weight:700;">${zar2(netEarned)}</div>
        </div>
        <div style="height:1px;background:rgba(255,255,255,.15);margin:12px 0;"></div>
        <div class="pay-line" style="border:none;color:#fff;opacity:.9;padding:4px 0;"><span>Live clients booked</span><span>${myRows.length}</span></div>
        <div class="pay-line" style="border:none;color:#fff;opacity:.9;padding:4px 0;"><span>Premium under your book</span><span class="mono">${zar2(earnedPrem)}</span></div>
        <div class="pay-line" style="border:none;color:#fff;opacity:.9;padding:4px 0;"><span>Commission earned</span><span class="mono">${zar2(earnedComm)}</span></div>
        ${sal>0?`<div class="pay-line" style="border:none;color:#F4DCD8;padding:4px 0;"><span>Less assistant salary</span><span class="mono">-${zar2(sal)}</span></div>`:''}
      </div>
      ${myRows.length===0?`<div class="help" style="margin:-4px 0 10px;">Nothing booked yet for ${moLabel}. Earned commission appears once Brendan captures your live clients in payroll.</div>`:
        `<div class="sec-title">Your booked clients</div><div class="card">${myRows.map(r=>`<div class="pay-line"><span>${esc(r.client)}</span><span style="text-align:right;">${zar2(r.premium)}<br><span style="color:var(--green);font-size:11px;">you: ${zar2(rowPayout(r))}</span></span></div>`).join('')}</div>`}

      <div class="sec-title">\u{1F4C8} Estimated commission (your live book)</div>
      <div class="card" style="border:1.5px solid var(--accent);">
        <div class="pay-line big" style="padding-bottom:4px;border:none;"><span>Your book commission</span><span class="mono" style="color:var(--accent-ink);font-size:20px;">${zar2(estComm)}</span></div>
        <div class="pay-line" style="color:var(--soft);border:none;"><span>${book.length} active client${book.length===1?'':'s'}</span><span class="mono">${zar2(bookPrem)} premium</span></div>
        <div class="help" style="margin-top:8px;">What your current book of business is worth to you at the standard split. This updates automatically whenever you edit a client's premium on <b>My Clients</b> — so keep your premiums current and this stays accurate. It's an estimate on your active book, separate from what Brendan formally books in payroll above.</div>
      </div>

      <div class="sec-title">\u{1F3AF} Potential in your pipeline (not yet earned)</div>
      <div class="card">
        <div class="pay-line big" style="padding-bottom:4px;"><span>If your open pipeline closes</span><span class="mono" style="color:var(--accent);">${zar2(potentialComm)}</span></div>

        <div class="help" style="margin-top:8px;">This is an estimate on deals you're still chasing — it becomes real commission only once the client is signed and Brendan books it. Chase the amber and red ones on your pipeline to move these across.</div>

    const nx=document.getElementById('mo-next');if(nx&&!isCurrent)nx.onclick=()=>{S._commMonth=nextMo();wireRMCommission(slug);};
  }

  function wireModal(){
    let h=S.modal.deal?S.modal.deal.health:'amber';
    document.getElementById('mx').onclick=()=>{S.modal=null;render();};
    document.getElementById('mbd').onclick=e=>{if(e.target.id==='mbd'){S.modal=null;render();}};
    document.querySelectorAll('.hp-opt').forEach(o=>o.onclick=()=>{h=o.dataset.h;document.querySelectorAll('.hp-opt').forEach(x=>x.className='hp-opt');o.classList.add(h==='green'?'sg':h==='amber'?'sa':'sr');});
    // Stage-phrase quick picker
    const stageEl=document.getElementById('f-stage');
    const phraseEl=document.getElementById('f-phrase');
    const nextEl=document.getElementById('f-next');
    const fillPhrases=()=>{
      const st=stageEl.value;
      const list=(STAGE_PHRASES[st]||[]);
      phraseEl.innerHTML='<option value="">— pick a standard update or type your own below —</option>'+list.map((p,i)=>`<option value="${i}">${esc(p.length>60?p.slice(0,60)+'…':p)}</option>`).join('');
    };
    fillPhrases();
    stageEl.addEventListener('change',fillPhrases);
    phraseEl.addEventListener('change',()=>{
      const st=stageEl.value;const list=(STAGE_PHRASES[st]||[]);const i=phraseEl.value;
      if(i!==''&&list[i]){nextEl.value=list[i];}
    });
    document.getElementById('m-save').onclick=async()=>{
      const name=document.getElementById('f-name').value.trim();
      if(!name){toast('Prospect name required');return;}
      const slug=S.modal.slug, ex=S.modal.mode==='edit'?S.modal.deal:null;
      const st=parseInt(document.getElementById('f-stage').value,10);
      const stageChanged=ex?ex.stage!==st:true;
      const d={id:ex?ex.id:uid(),prospectName:name,industry:document.getElementById('f-ind').value.trim(),portfolioSize:document.getElementById('f-port').value.trim(),
        stage:st,nextStep:document.getElementById('f-next').value.trim(),roadblocks:document.getElementById('f-road').value.trim(),
        premium:parseFloat(document.getElementById('f-prem').value)||0,leadSource:document.getElementById('f-lead').value,
        stageEntryDate:(ex&&!stageChanged)?ex.stageEntryDate:today(),lastActivity:today(),health:h,archived:ex?ex.archived:false,
        createdAt:ex?ex.createdAt:nowISO(),updatedAt:nowISO()};
      if(!S.deals[slug])S.deals[slug]=[];
      if(ex){const i=S.deals[slug].findIndex(x=>x.id===ex.id);const old=S.deals[slug][i];S.deals[slug][i]=d;
        if(old.stage!==d.stage)logChange(slug,`${d.prospectName}: moved ${old.stage}→${d.stage} (${STAGES[d.stage-1]})`,'stage');
        else logChange(slug,`Updated ${d.prospectName}`,'update');
        if(old.health!==d.health)logChange(slug,`${d.prospectName}: health ${HEALTH[old.health]}→${HEALTH[d.health]}`,'health');
      }else{S.deals[slug].push(d);logChange(slug,`New prospect added: ${d.prospectName} (${zar(d.premium)})`,'new');}
      const ok=await saveRM(slug);S.modal=null;render();if(ok)toast('Saved');
    };
  }

      if(!list||!list.length)return `<div class="sec-title">${title}</div><div class="card"><div class="empty" style="padding:14px;">No changes logged.</div></div>`;
      const icon=t=>({stage:'\u2191',new:'\u002B',health:'\u2665',arch:'\u{1F4E6}',update:'\u270E'}[t]||'\u2022');
      const bg=t=>({stage:'var(--green-soft)',new:'var(--accent-soft)',health:'var(--amber-soft)'}[t]||'var(--bg)');
      return `<div class="sec-title">${title} (${list.length})</div><div class="card">${list.slice().reverse().map(c=>`<div class="change-item">

  function buildReport(cy,ydate){
    const deals=allActive();
    const total=deals.reduce((s,d)=>s+(+d.premium||0),0);
    const c={green:0,amber:0,red:0};deals.forEach(d=>c[d.health]++);
    const stale=deals.filter(d=>daysSince(d.lastActivity||d.stageEntryDate)>=STALE_DAYS&&d.stage<7);
    const dstr=new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'});
    let t=`\u{1F536} CARTRACK COMMERCIAL — MORNING REPORT\n${dstr}\n\n`;
    t+=`PIPELINE: ${deals.length} active · ${zar(total)}\n\u{1F7E2}${c.green}  \u{1F7E1}${c.amber}  \u{1F534}${c.red}\n\n`;
    t+=`\u2500\u2500 YESTERDAY'S MOVES \u2500\u2500\n`;
    if(cy&&cy.length){const byRM={};cy.forEach(c=>{(byRM[c.rm]=byRM[c.rm]||[]).push(c);});Object.keys(byRM).forEach(rm=>{t+=`\n${rm}:\n`;byRM[rm].forEach(c=>t+=`  • ${c.text}\n`);});}
    else t+='No changes logged yesterday.\n';
    if(stale.length){t+=`\n\u26A0 NEEDS ATTENTION — ${stale.length} stale (${STALE_DAYS}d+ no movement):\n`;stale.slice(0,10).forEach(d=>t+=`  • ${d.prospectName} (${d.rmName}) — ${daysSince(d.lastActivity||d.stageEntryDate)}d — ${STAGES[d.stage-1]}\n`);}
    t+=`\nFull detail on the Command View dashboard.`;
    return t;
  }

  function wireLostView(){
    document.querySelectorAll('[data-restore]').forEach(b=>b.onclick=async()=>{
      const idx=b.dataset.restore.indexOf(':');
      const slug=b.dataset.restore.slice(0,idx), id=b.dataset.restore.slice(idx+1);
      const arr=S.lost[slug]||[];const i=arr.findIndex(x=>x.id===id);if(i<0)return;
      const l=arr[i];
      const d={id:uid(),prospectName:l.prospectName,industry:l.industry||'',portfolioSize:l.portfolioSize||'',
        stage:l.stageAtLoss||1,nextStep:'Restored from not-successful — re-engage',roadblocks:'',
        premium:+l.premium||0,leadSource:l.leadSource||LEAD_SOURCES[0],health:'amber',
        stageEntryDate:today(),lastActivity:today(),archived:false,createdAt:nowISO(),updatedAt:nowISO()};
      if(!S.loaded[slug])await loadRM(slug);
      S.deals[slug]=S.deals[slug]||[];S.deals[slug].push(d);
      await saveRM(slug);
      S.lost[slug]=arr.filter(x=>x.id!==id);
      await saveLost(slug);
      logChange(slug,`Restored to pipeline: ${l.prospectName}`,'restore');
      render();toast(`${l.prospectName} restored to ${rmName(slug)}'s pipeline`);
    });
  }

  // ---- Bernard's own deals (he's also an RM) — full edit, same as RM pipeline ----
  function mgrMine(){
    const slug='bernard';
    const all=(S.deals[slug]||[]);
    const active=all.filter(d=>!d.archived);
    const arch=all.filter(d=>d.archived);
    const list=S.showArch?arch:active;
    return `<div class="wrap">
      <div class="note">Your own pipeline, same as any RM. Add and update your deals here — this is the only tab that's yours alone.</div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin:4px 0 10px;">
        <div class="sec-title" style="margin:0;">${S.showArch?'Archived':'Active'} (<span id="pipe-count">${list.length}</span>)</div>
        <button class="link-btn" id="arch-t">${S.showArch?'← Back to active':'View archived'}</button>
      </div>
      ${(list.length>3)?`<div class="field" style="margin-bottom:10px;"><input id="pipe-search" placeholder="\u{1F50D} Search by name, industry or next step…" autocomplete="off"></div>`:''}
      ${list.length===0?`<div class="empty"><div class="disp">${S.showArch?'Nothing archived':'No deals yet'}</div>${!S.showArch?'Tap + to add your first prospect.':''}</div>`:
        list.map(d=>dealCard('bernard',d,!S.showArch)).join('')}
      <div id="pipe-nomatch" class="empty" style="display:none;"><div class="disp">No matches</div><div>No leads match your search.</div></div>
      ${!S.showArch?`<div class="sec-title" style="margin-top:24px;">My passcode</div>
      <div class="card"><div class="help" style="margin-bottom:10px;">This is the passcode you use to sign in as RM Manager. Change it to something only you know.</div>
        <div class="field"><label>New passcode</label><input id="bp-new" type="text" placeholder="New manager passcode"></div>
        <button class="btn btn-primary btn-full" id="bp-save">Update my passcode</button></div>`:''}
      ${!S.showArch?'<button class="fab" id="fab">+</button>':''}
    </div>`;
  }
  function wireMgrMine(){
    const at=document.getElementById('arch-t');if(at)at.onclick=()=>{S.showArch=!S.showArch;render();};
    const fab=document.getElementById('fab');if(fab)fab.onclick=()=>{S.modal={mode:'add',slug:'bernard'};render();};
    document.querySelectorAll('[data-edit]').forEach(b=>b.onclick=()=>{const d=(S.deals['bernard']||[]).find(x=>x.id===b.dataset.edit);S.modal={mode:'edit',slug:'bernard',deal:d};render();});
    document.querySelectorAll('[data-arch]').forEach(b=>b.onclick=async()=>{const d=S.deals['bernard'].find(x=>x.id===b.dataset.arch);d.archived=!d.archived;d.updatedAt=nowISO();await saveRM('bernard');logChange('bernard',`${d.archived?'Archived':'Restored'}: ${d.prospectName}`,'arch');toast(d.archived?'Archived':'Restored');});
    wireLostButtons('bernard');
    wirePipeSearch();
    const bp=document.getElementById('bp-save');if(bp)bp.onclick=async()=>{const v=document.getElementById('bp-new').value.trim();if(v.length<4){toast('Use at least 4 characters');return;}if(v===OPERATOR_CODE){toast('That code is reserved — pick another');return;}S.meta.bernardPass=v;await saveMeta();toast('Passcode updated');};
  }

  // ================= PAYROLL (Brendan) =================
  function renderPay(){
    root.innerHTML=`
      <div class="hdr hdr-pay">
        <div class="hdr-top"><div class="hdr-id"><div class="hdr-mark">\u{1F4B0}</div>
          <div><div class="hdr-title">RM Payroll</div><div class="hdr-sub">${viewerName()} · RM commissions</div></div></div>
          <button class="logout" id="lo">Sign out</button></div>
        <div class="tabs"><button class="tab ${S.tab==='enter'?'active':''}" id="t-en">Enter Commission</button>
          <button class="tab ${S.tab==='summary'?'active':''}" id="t-su">Payout Summary</button></div>
      </div><div id="body"></div>
      ${S.modal?renderPayModal():''}${S.toast?`<div class="toast">${esc(S.toast)}</div>`:''}`;
    document.getElementById('lo').onclick=logout;
    document.getElementById('t-en').onclick=()=>{S.tab='enter';render();};
    document.getElementById('t-su').onclick=()=>{S.tab='summary';render();};
    const body=document.getElementById('body');
    if(S.tab==='enter'){body.innerHTML=payEnter();wirePayEnter();}
    else{body.innerHTML=paySummary();wirePaySummary();}
    if(S.modal)wirePayModal();
  }

  function payEnter(){
    const rows=S.payroll.rows;
    const sel=S._paySel||'all';
    const byRM={};rows.forEach(r=>{(byRM[r.rm]=byRM[r.rm]||[]).push(r);});
    const shownRMs=sel==='all'?RMS:RMS.filter(r=>r.slug===sel);
    const payout=payoutOf;
    const grandPay=rows.reduce((s,x)=>s+payout(x),0);
    return `<div class="wrap wrap-wide">
      <div class="note">Every RM's clients are loaded from their book with the actual June premium and commission rate. Just edit any <b>premium</b> or <b>rate %</b> and the payout updates itself. Formula: <b>payout = premium × rate %</b>. Standard recurring is 6.25%; new business runs higher (often 50%). Figures save per month.</div>
      <div style="display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;margin-bottom:6px;">
        <div class="field" style="max-width:200px;margin:0;"><label>Payroll month</label><input id="pm" type="month" value="${esc(S.payroll.month)}"></div>
        <div class="kpi" style="flex:1;min-width:180px;"><div class="kpi-l">Total payout, all RMs</div><div class="kpi-v mono" style="font-size:18px;color:var(--green);" id="grand-pay">${zar2(grandPay)}</div></div>
      </div>
      <div class="metric-switch" style="flex-wrap:wrap;">
        <button class="ms-btn ${sel==='all'?'active':''}" data-psel="all">All RMs</button>
        ${RMS.map(r=>{const n=(byRM[r.slug]||[]).length;return `<button class="ms-btn ${sel===r.slug?'active':''}" data-psel="${r.slug}">${esc(r.name)}${n?` (${n})`:''}</button>`;}).join('')}
      </div>
      ${shownRMs.map(r=>{
        const rr=byRM[r.slug]||[];
        const subPay=rr.reduce((s,x)=>s+payout(x),0);
        return `<div class="sec-title" style="display:flex;justify-content:space-between;align-items:center;">
            <span>${esc(r.full)}</span>
            <span class="mono" style="font-weight:400;text-transform:none;letter-spacing:0;">${rr.length} client${rr.length===1?'':'s'} · <span data-subpay="${r.slug}">${zar2(subPay)}</span></span>
          </div>
          <div class="card" style="padding:8px 0;">
            <table><tr><th style="padding-left:12px;">Client</th><th>Premium (R)</th><th>Rate %</th><th>Payout</th><th></th></tr>
            ${rr.length===0?`<tr><td colspan="5"><div class="empty" style="padding:12px;">No clients on ${esc(r.name)}'s book yet.</div></td></tr>`:
              rr.map(x=>`<tr data-row="${x.id}">
                <td style="padding-left:12px;"><b>${esc(x.client)}</b>${x.insurer?`<div class="change-time">${esc(x.insurer)}</div>`:''}</td>
                <td><input class="pay-inp" data-f="premium" data-id="${x.id}" type="number" step="0.01" value="${x.premium||0}"></td>
                <td><input class="pay-inp pay-pct" data-f="commRate" data-id="${x.id}" type="number" step="0.25" value="${rateOf(x)}"></td>
                <td class="mono" style="font-weight:700;color:var(--green);" data-payout="${x.id}">${zar2(payout(x))}</td>
                <td><button class="del-x" data-del="${x.id}">✕</button></td></tr>`).join('')}
            </table>
            <div style="padding:10px 12px 4px;"><button class="btn btn-ghost btn-full add-client" data-addrm="${r.slug}" style="font-size:12.5px;">+ Add a client not on the book</button></div>
          </div>`;
      }).join('')}
      <div style="margin-top:12px;"><button class="btn btn-full" id="paste-rows">Paste a whole list</button></div>
    </div>`;
  }
  function wirePayEnter(){
    document.getElementById('pm').onchange=async e=>{S.payroll=await loadPayroll(e.target.value);render();};
    document.querySelectorAll('[data-psel]').forEach(b=>b.onclick=()=>{S._paySel=b.dataset.psel;render();});
    document.querySelectorAll('.add-client').forEach(b=>b.onclick=()=>{S.modal={type:'payrow',slug:b.dataset.addrm};render();});
    document.getElementById('paste-rows').onclick=()=>{S.modal={type:'paste'};render();};
    document.querySelectorAll('[data-del]').forEach(b=>b.onclick=async()=>{S.payroll.rows=S.payroll.rows.filter(r=>r.id!==b.dataset.del);await savePayroll();render();});
    const payout=payoutOf;
    const recalcRow=(id)=>{
      const r=S.payroll.rows.find(x=>x.id===id);if(!r)return;
      const cell=document.querySelector(`[data-payout="${id}"]`);if(cell)cell.textContent=zar2(payout(r));
      // subtotal for that RM
      const sub=S.payroll.rows.filter(x=>x.rm===r.rm).reduce((s,x)=>s+payout(x),0);
      const subEl=document.querySelector(`[data-subpay="${r.rm}"]`);if(subEl)subEl.textContent=zar2(sub);
      // grand total
      const g=S.payroll.rows.reduce((s,x)=>s+payout(x),0);
      const gEl=document.getElementById('grand-pay');if(gEl)gEl.textContent=zar2(g);
    };
    document.querySelectorAll('.pay-inp').forEach(inp=>{
      inp.oninput=()=>{
        const id=inp.dataset.id, f=inp.dataset.f;
        const r=S.payroll.rows.find(x=>x.id===id);if(!r)return;
        if(f==='commRate'){r.commRate=inp.value===''?6.25:(parseFloat(inp.value)||0);delete r.rmPct;}
        else{r.premium=inp.value===''?0:(parseFloat(inp.value)||0);}
        recalcRow(id);
      };
      inp.onblur=async()=>{await savePayroll();};
    });
  }

  function renderPayModal(){
    if(S.modal.type==='payrow'){
      const slug=S.modal.slug;
      const book=(S.portfolio[slug]||[]).slice().sort((a,b)=>a.client.localeCompare(b.client));
      return `<div class="modal-bd" id="mbd"><div class="modal">
        <div class="modal-h"><div class="modal-t">Add client — ${esc(rmName(slug))}</div><button class="x" id="mx">✕</button></div>
        <div class="field"><label>Client (from ${esc(rmName(slug))}'s portfolio)</label>
          <select id="pc-sel">
            <option value="">— pick a client —</option>
            ${book.map(p=>`<option value="${esc(p.client)}" data-prem="${p.premium||0}">${esc(p.client)} · ${zar2(p.premium)}</option>`).join('')}
            <option value="__custom">+ Type a different name…</option>
          </select></div>
        <div class="field" id="pc-custom-wrap" style="display:none;"><label>Client name</label><input id="pc-custom" placeholder="e.g. New client not in portfolio"></div>
        <div class="field-row">
          <div class="field"><label>Monthly premium (ZAR)</label><input id="pp" type="number" step="0.01" placeholder="0.00"></div>
          <div class="field"><label>Rate % of premium</label><input id="prm" type="number" step="0.25" value="6.25"></div>
        </div>
        <div class="card" style="background:var(--accent-soft);border:none;margin-bottom:12px;">
          <div class="pay-line big" style="border:none;padding:0;"><span>Payout</span><span class="mono" id="pc-payout" style="color:var(--accent-ink);">R 0.00</span></div>
          <div class="help" style="margin-top:4px;">premium × rate % (6.25% standard, higher for new business)</div>
        </div>
        <button class="btn btn-primary btn-full" id="psave">Add client</button>
      </div></div>`;
    }
    if(S.modal.type==='salary'){
      const slug=S.modal.slug;const cur=((S.payroll.salary||{})[slug]||0);
      return `<div class="modal-bd" id="mbd"><div class="modal" style="max-width:420px;">
        <div class="modal-h"><div class="modal-t">Assistant-salary deduction</div><button class="x" id="mx">✕</button></div>
        <div class="help" style="margin-bottom:10px;">For <b>${esc(rmName(slug))}</b> this month (${esc(S.payroll.month)}). Deducted from their RM commission before net payout.</div>
        <div class="field"><label>Deduction (ZAR)</label><input id="sal-v" type="number" step="0.01" value="${cur||''}" placeholder="0.00"></div>
        <button class="btn btn-primary btn-full" id="sal-save">Save deduction</button>
      </div></div>`;
    }
    return `<div class="modal-bd" id="mbd"><div class="modal">
      <div class="modal-h"><div class="modal-t">Paste rows</div><button class="x" id="mx">✕</button></div>
      <div class="help" style="margin-bottom:8px;">One client per line: <b>Client, RM, premium, rate%</b> (rate% optional, defaults 6.25). Example:<br><span class="mono">Avis Isando, Bernard, 557194, 6.25</span></div>
      <div class="field"><textarea id="pt" style="min-height:140px;" placeholder="Fouries Poultry, Bernard, 251396, 6.25&#10;Full Tank, Cules, 239446, 50"></textarea></div>
      <button class="btn btn-primary btn-full" id="pt-save">Import rows</button>
    </div></div>`;
  }
  function wirePayModal(){
    document.getElementById('mx').onclick=()=>{S.modal=null;render();};
    document.getElementById('mbd').onclick=e=>{if(e.target.id==='mbd'){S.modal=null;render();}};
    if(S.modal.type==='payrow'){
      const sel=document.getElementById('pc-sel');
      const custom=document.getElementById('pc-custom-wrap');
      const premEl=document.getElementById('pp');
      const pctEl=document.getElementById('prm');
      const payEl=document.getElementById('pc-payout');
      const recalc=()=>{const p=parseFloat(premEl.value)||0;const pct=parseFloat(pctEl.value)||0;payEl.textContent=zar2(p*(pct/100));};
      sel.onchange=()=>{
        if(sel.value==='__custom'){custom.style.display='';premEl.value='';}
        else{custom.style.display='none';const opt=sel.options[sel.selectedIndex];const pr=opt?opt.getAttribute('data-prem'):0;if(pr)premEl.value=pr;}
        recalc();
      };
      premEl.oninput=recalc;pctEl.oninput=recalc;
      document.getElementById('psave').onclick=async()=>{
        let client=sel.value;
        if(client==='__custom')client=(document.getElementById('pc-custom').value||'').trim();
        if(!client||client==='')  {toast('Pick or type a client');return;}
        const premium=parseFloat(premEl.value)||0;
        const commRate=pctEl.value===''?6.25:(parseFloat(pctEl.value)||0);
        S.payroll.rows.push({id:uid(),client,rm:S.modal.slug,premium,commRate});
        await savePayroll();S.modal=null;render();toast('Client added');
      };
    }else if(S.modal.type==='salary'){
      document.getElementById('sal-save').onclick=async()=>{
        const slug=S.modal.slug;const v=parseFloat(document.getElementById('sal-v').value)||0;
        S.payroll.salary=S.payroll.salary||{};S.payroll.salary[slug]=v;await savePayroll();S.modal=null;render();toast('Deduction saved');
      };
    }else{
      document.getElementById('pt-save').onclick=async()=>{
        const lines=document.getElementById('pt').value.split('\n').map(l=>l.trim()).filter(Boolean);
        let added=0;
        lines.forEach(l=>{const parts=l.split(',').map(x=>x.trim());if(parts.length<3)return;
          const client=parts[0];const rmGuess=parts[1].toLowerCase();const premium=parseFloat(parts[2].replace(/[^\d.]/g,''))||0;
          const commRate=parts[3]!=null&&parts[3]!==''?(parseFloat(parts[3])||6.25):6.25;
          const rm=(RMS.find(r=>r.name.toLowerCase()===rmGuess||r.slug===rmGuess)||{}).slug;
          if(!rm||!client)return;S.payroll.rows.push({id:uid(),client,rm,premium,commRate});added++;});
        await savePayroll();S.modal=null;render();toast(`${added} row${added===1?'':'s'} imported`);
      };
    }
  }

  function paySummary(){
    const rows=S.payroll.rows;
    const payout=payoutOf;
    const per=RMS.map(r=>{const rr=rows.filter(x=>x.rm===r.slug);
      const prem=rr.reduce((s,x)=>s+(+x.premium||0),0);
      const broker=prem*BROKERAGE_RATE;
      const rmComm=rr.reduce((s,x)=>s+payout(x),0);
      const sal=+((S.payroll.salary||{})[r.slug]||0);
      return{slug:r.slug,name:r.full,clients:rr.length,prem,broker,rmComm,sal,net:rmComm-sal};}).filter(r=>r.clients>0||r.sal>0);
    const tot=per.reduce((a,r)=>({prem:a.prem+r.prem,broker:a.broker+r.broker,rmComm:a.rmComm+r.rmComm,sal:a.sal+r.sal,net:a.net+r.net,clients:a.clients+r.clients}),{prem:0,broker:0,rmComm:0,sal:0,net:0,clients:0});
    return `<div class="wrap wrap-wide">
      <div class="note">Accountant-ready payout for <b>${esc(S.payroll.month||'—')}</b>. Each client's commission = premium × 12.5% × that client's RM %, less any assistant-salary split. Tap "Copy for accountant" to send it off.</div>
      <div class="card" style="background:linear-gradient(135deg,#0B0C0F,#2F343D);color:#fff;border:none;margin-bottom:14px;">
        <div style="display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:8px;">
          <div><div style="font-size:12px;opacity:.7;">Total RM commission — everyone, ${esc(S.payroll.month||'—')}</div>
            <div class="mono" style="font-family:'Saira';font-size:30px;font-weight:800;color:#fff;">${zar2(tot.net)}</div></div>
          <div style="text-align:right;font-size:12px;opacity:.85;line-height:1.7;">
            <div>${tot.clients} clients · ${per.length} RM${per.length===1?'':'s'}</div>
            <div>Gross ${zar2(tot.rmComm)}${tot.sal>0?` · less salaries ${zar2(tot.sal)}`:''}</div></div>
        </div>
      </div>
      <div class="card" style="padding:6px 0;"><table>
        <tr><th>RM</th><th>Clients</th><th>Premium</th><th>Broker 12.5%</th><th>RM commission</th><th>Less salary</th><th>Net payout</th><th></th></tr>
        ${per.length===0?'<tr><td colspan="8"><div class="empty" style="padding:16px;">No commission entered for this month yet.</div></td></tr>':
        per.map(r=>`<tr><td><b>${esc(r.name)}</b></td><td>${r.clients}</td><td class="mono">${zar2(r.prem)}</td><td class="mono">${zar2(r.broker)}</td>
          <td class="mono">${zar2(r.rmComm)}</td><td class="mono" style="color:${r.sal>0?'var(--red)':'inherit'}">${r.sal>0?'-'+zar2(r.sal):'—'}</td>
          <td class="mono" style="font-weight:700;">${zar2(r.net)}</td>
          <td><button class="link-btn" data-sal="${r.slug}">salary</button></td></tr>`).join('')}
        ${per.length?`<tr class="tot-row"><td>TOTAL</td><td>${tot.clients}</td><td class="mono">${zar2(tot.prem)}</td><td class="mono">${zar2(tot.broker)}</td><td class="mono">${zar2(tot.rmComm)}</td><td class="mono">${tot.sal>0?'-'+zar2(tot.sal):'—'}</td><td class="mono">${zar2(tot.net)}</td><td></td></tr>`:''}
      </table></div>
      ${per.length?`<button class="btn btn-navy btn-full" id="cp-acc">Copy for accountant</button><div id="acc-out"></div>`:''}
    </div>`;
  }
  function wirePaySummary(){
    document.querySelectorAll('[data-sal]').forEach(b=>b.onclick=()=>{
      S.modal={type:'salary',slug:b.dataset.sal};render();
    });
    const cp=document.getElementById('cp-acc');if(cp)cp.onclick=()=>{
      const rows=S.payroll.rows;
      const payout=payoutOf;
      const per=RMS.map(r=>{const rr=rows.filter(x=>x.rm===r.slug);const prem=rr.reduce((s,x)=>s+(+x.premium||0),0);const rmComm=rr.reduce((s,x)=>s+payout(x),0);const sal=+((S.payroll.salary||{})[r.slug]||0);return{name:r.full,clients:rr.length,prem,rmComm,sal,net:rmComm-sal};}).filter(r=>r.clients>0||r.sal>0);
      let t=`CARTRACK COMMERCIAL — RM COMMISSION (${S.payroll.month})\nBrokerage 12.5% of premium · RM % applied per client\n\n`;
      per.forEach(r=>{t+=`${r.name}\n  Clients: ${r.clients} · Premium: ${zar2(r.prem)}\n  RM commission: ${zar2(r.rmComm)}${r.sal>0?`\n  Less assistant salary: -${zar2(r.sal)}`:''}\n  NET PAYOUT: ${zar2(r.net)}\n\n`;});
      const totNet=per.reduce((s,r)=>s+r.net,0);t+=`TOTAL NET PAYOUT: ${zar2(totNet)}`;
      navigator.clipboard?navigator.clipboard.writeText(t).then(()=>toast('Copied for accountant')):toast('Copy not supported');
    };
  }
})();
</script>
